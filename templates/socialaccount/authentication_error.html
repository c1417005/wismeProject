{% extends "base/wisme_base.html" %}
{% block title %}ログインエラー — Wisme{% endblock %}

{% block body %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl border border-stone-100 shadow-sm p-8 text-center space-y-4">
        <div class="w-12 h-12 bg-red-50 rounded-full flex items-center justify-center mx-auto">
            <i data-lucide="alert-circle" class="w-6 h-6 text-red-400"></i>
        </div>
        <h1 class="text-lg font-semibold text-stone-800">ログインに失敗しました</h1>
        <p class="text-sm text-stone-500 leading-relaxed">
            外部アカウントでのログイン中にエラーが発生しました。<br>
            時間をおいて、もう一度お試しください。
        </p>

        <a href="{% url 'account_login' %}"
           class="inline-flex items-center justify-center gap-2 mt-4 bg-stone-800 text-white px-5 py-2.5 rounded-lg text-sm hover:bg-stone-700 transition-colors font-medium">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            ログイン画面に戻る
        </a>
    </div>
</div>
{% endblock %}
