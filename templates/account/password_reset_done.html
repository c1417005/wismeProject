{% extends "base/wisme_base.html" %}
{% block title %}メールを送信しました — Wisme{% endblock %}

{% block body %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl border border-stone-100 shadow-sm p-8 text-center space-y-4">
        <div class="w-12 h-12 bg-accent-50 rounded-full flex items-center justify-center mx-auto">
            <i data-lucide="mail-check" class="w-6 h-6 text-accent-600"></i>
        </div>
        <h1 class="text-lg font-semibold text-stone-800">メールを送信しました</h1>
        <p class="text-sm text-stone-500 leading-relaxed">
            パスワード再設定用のリンクをメールでお送りしました。<br>
            メールをご確認のうえ、リンクから再設定を行ってください。
        </p>
        <p class="text-xs text-stone-400 leading-relaxed">
            メールが届かない場合は、迷惑メールフォルダをご確認ください。
        </p>

        <a href="{% url 'account_login' %}"
           class="inline-flex items-center justify-center gap-2 mt-4 border border-stone-200 text-stone-600 px-5 py-2.5 rounded-lg text-sm hover:bg-stone-50 transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            ログイン画面に戻る
        </a>
    </div>
</div>
{% endblock %}
