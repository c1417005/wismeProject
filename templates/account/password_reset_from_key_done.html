{% extends "base/wisme_base.html" %}
{% block title %}パスワードを変更しました — Wisme{% endblock %}

{% block body %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl border border-stone-100 shadow-sm p-8 text-center space-y-4">
        <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center mx-auto">
            <i data-lucide="check-circle" class="w-6 h-6 text-emerald-600"></i>
        </div>
        <h1 class="text-lg font-semibold text-stone-800">パスワードを変更しました</h1>
        <p class="text-sm text-stone-500 leading-relaxed">
            新しいパスワードでログインできます。
        </p>

        <a href="{% url 'account_login' %}"
           class="inline-flex items-center justify-center gap-2 mt-4 bg-stone-800 text-white px-5 py-2.5 rounded-lg text-sm hover:bg-stone-700 transition-colors font-medium">
            ログイン画面へ
        </a>
    </div>
</div>
{% endblock %}
